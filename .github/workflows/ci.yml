name: CI

# Two jobs, one file: `verify` guards every pull request, and `publish` runs
# only on main and only when package.json names a version npm doesn't have yet.
# Before this the repo had no workflows at all — nothing ran on a PR, and every
# release was published by hand from a laptop.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  publish:
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      # write, not read: the last step pushes a vX.Y.Z tag.
      contents: write
      # The whole authentication story. npm's trusted publishing exchanges this
      # short-lived OIDC token for publish rights, so there is no npm token on
      # the repo to leak, rotate or expire — and npm is restricting the
      # 2FA-bypassing tokens that were the alternative (account changes Aug
      # 2026, direct publishing Jan 2027). It also gets provenance for free.
      #
      # Requires a trusted publisher configured on the package at npmjs.com
      # naming this repo AND this workflow file (ci.yml). Rename this file and
      # publishing stops until the publisher is updated to match.
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Node 22 ships npm 10, which predates trusted publishing — it would fall
      # back to looking for a token and fail with EOTP. Pin forward, don't
      # assume the runner's bundled npm is new enough.
      - run: npm install -g npm@latest
      - run: npm --version

      - run: npm ci

      # Publishing a version that already exists is a hard error, so every
      # ordinary commit to main would fail the workflow. Ask the registry first
      # and skip quietly instead — a release is then just a version bump.
      - id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "velanto-mcp@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "velanto-mcp@$VERSION is already on npm — nothing to do."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "velanto-mcp@$VERSION is new — publishing."
          fi

      - if: steps.check.outputs.published == 'false'
        # No NODE_AUTH_TOKEN: authentication is the OIDC exchange, and
        # provenance is automatic under trusted publishing.
        run: npm publish

      # A tag per published version, so the registry and the git history agree
      # on what shipped. Only after a successful publish.
      - if: steps.check.outputs.published == 'false'
        run: |
          git tag "v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"
